[lint]
paths = [
  "tools/repo_guardrails.py",
  "millrace_engine",
]
exclude_paths = ["@tools/guardrail_lint_excluded_paths.txt"]
args = ["--ignore", "E501"]
format_check = false
scope = "shipped runtime package with named residual lint exclusions"
rationale = "Lint now walks the shipped runtime package plus the guardrail runner itself. Residual exclusions are explicit file-level debt, not a representative demo slice."

[typecheck]
paths = [
  "tools/repo_guardrails.py",
  "@tools/guardrail_typecheck_surface.txt",
]
args = ["--follow-imports=silent"]
scope = "broad product-facing strict-mypy runtime surface"
rationale = "Type-checking now spans a broad cross-subsystem runtime surface plus the guardrail runner across contracts, runtime helpers, policies, stages, research helpers, and TUI foundations."

[budgets]
runtime_limit = 500
test_limit = 800

[budgets.ratchet]
runtime = [
  "millrace_engine/planes/execution.py",
]
diff_base = "HEAD"

[budgets.temporary_exceptions]
runtime = []

[budgets.exceptions]
runtime = [
  "millrace_engine/cli.py",
  "millrace_engine/cli_rendering.py",
  "millrace_engine/compiler.py",
  "millrace_engine/config.py",
  "millrace_engine/contract_documents.py",
  "millrace_engine/control_models.py",
  "millrace_engine/control_reports.py",
  "millrace_engine/diagnostics.py",
  "millrace_engine/health.py",
  "millrace_engine/loop_architecture_stage_contracts.py",
  "millrace_engine/materialization.py",
  "millrace_engine/planes/execution.py",
  "millrace_engine/planes/execution_runtime.py",
  "millrace_engine/planes/research.py",
  "millrace_engine/policies/hooks.py",
  "millrace_engine/policies/sizing.py",
  "millrace_engine/provenance.py",
  "millrace_engine/registry.py",
  "millrace_engine/research/incident_documents.py",
  "millrace_engine/research/incidents.py",
  "millrace_engine/research/interview.py",
  "millrace_engine/research/specs.py",
  "millrace_engine/research/taskmaster.py",
  "millrace_engine/status.py",
  "millrace_engine/telemetry.py",
  "millrace_engine/tui/gateway_views.py",
  "millrace_engine/tui/models.py",
  "millrace_engine/tui/widgets/logs_panel.py",
  "millrace_engine/tui/widgets/queue_panel.py",
  "millrace_engine/tui/widgets/research_panel.py",
  "millrace_engine/workspace_init.py",
]
tests = [
  "tests/test_cli.py",
  "tests/test_compiler.py",
  "tests/test_execution_plane.py",
  "tests/test_research_dispatcher.py",
  "tests/test_tui.py",
]

[[cycles.allowed]]
modules = [
  "millrace_engine.compiler_models",
  "millrace_engine.compiler_rebinding",
]
