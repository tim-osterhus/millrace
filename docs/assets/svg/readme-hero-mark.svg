<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%">
  <defs>
    <linearGradient id="signalStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66f0de"/>
      <stop offset="100%" stop-color="#33d7c6"/>
    </linearGradient>
    <linearGradient id="signalFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7af6e6"/>
      <stop offset="100%" stop-color="#39dccb"/>
    </linearGradient>
    <filter id="signalGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke="#4b4840" stroke-width="2" opacity="0.35">
    <path d="M50 52 H120"/>
    <path d="M50 52 V122"/>
    <path d="M550 52 H480"/>
    <path d="M550 52 V122"/>
    <path d="M50 548 H120"/>
    <path d="M50 548 V478"/>
    <path d="M550 548 H480"/>
    <path d="M550 548 V478"/>
  </g>

  <g filter="url(#signalGlow)" fill="none" stroke="url(#signalStroke)" stroke-width="30" stroke-linecap="round">
    <circle cx="300" cy="168" r="112"/>
    <circle cx="170" cy="360" r="112"/>
    <circle cx="430" cy="360" r="112"/>
  </g>

  <path
    filter="url(#signalGlow)"
    fill="url(#signalFill)"
    fill-rule="evenodd"
    d="M300 220 L385 370 H330 L324 426 H276 L270 370 H215 Z
