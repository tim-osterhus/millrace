name: Repo Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Run pytest
        run: uv run --extra dev python -m pytest -q

      - name: Run Ruff
        run: uv run --with ruff ruff check src/millrace_ai tests

      - name: Run MyPy
        run: uv run --with mypy mypy src/millrace_ai
