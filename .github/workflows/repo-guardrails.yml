name: Repo Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Lint guardrail tooling
        run: python tools/repo_guardrails.py lint

      - name: Type-check guardrail tooling
        run: python tools/repo_guardrails.py typecheck

      - name: Enforce file-size budgets
        run: python tools/repo_guardrails.py budgets

      - name: Enforce import-cycle baseline
        run: python tools/repo_guardrails.py cycles

      - name: Run pytest through repo-local entrypoint
        run: python tools/repo_guardrails.py test -- -q tests
