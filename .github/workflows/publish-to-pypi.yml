name: Publish To PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distribution artifacts
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Smoke install built wheel against the release core contract
        run: |
          python -m venv .publish-smoke
          .publish-smoke/bin/python -m pip install --upgrade pip
          .publish-smoke/bin/python -m pip install dist/*.whl
          .publish-smoke/bin/millrace --help
          rm -rf /tmp/millrace-publish-smoke /tmp/millrace-publish-smoke-bin
          mkdir -p /tmp/millrace-publish-smoke-bin
          printf '#!/bin/sh\nexit 0\n' > /tmp/millrace-publish-smoke-bin/codex
          chmod +x /tmp/millrace-publish-smoke-bin/codex
          export PATH="/tmp/millrace-publish-smoke-bin:$PATH"
          .publish-smoke/bin/millrace init /tmp/millrace-publish-smoke --json
          .publish-smoke/bin/millrace --config /tmp/millrace-publish-smoke/millrace.toml health --json > /tmp/millrace-publish-smoke-health.json
          .publish-smoke/bin/millrace --config /tmp/millrace-publish-smoke/millrace.toml doctor --json > /tmp/millrace-publish-smoke-doctor.json
          .publish-smoke/bin/millrace --config /tmp/millrace-publish-smoke/millrace.toml add-task "Release smoke task" --json > /tmp/millrace-publish-smoke-add-task.json
          .publish-smoke/bin/millrace --config /tmp/millrace-publish-smoke/millrace.toml queue inspect --json > /tmp/millrace-publish-smoke-queue.json
          .publish-smoke/bin/python - <<'PY'
          import json
          from pathlib import Path

          health_payload = json.loads(Path("/tmp/millrace-publish-smoke-health.json").read_text(encoding="utf-8"))
          doctor_payload = json.loads(Path("/tmp/millrace-publish-smoke-doctor.json").read_text(encoding="utf-8"))
          add_task_payload = json.loads(Path("/tmp/millrace-publish-smoke-add-task.json").read_text(encoding="utf-8"))
          queue_payload = json.loads(Path("/tmp/millrace-publish-smoke-queue.json").read_text(encoding="utf-8"))

          assert health_payload["bootstrap_ready"] is True, health_payload
          assert health_payload["config_source_kind"] == "native_toml", health_payload

          assert doctor_payload["bootstrap_ready"] is True, doctor_payload
          assert doctor_payload["execution_ready"] is True, doctor_payload
          assert any(
              entry["executable"] == "codex" and entry["available"] is True
              for entry in doctor_payload["runner_prerequisites"]
          ), doctor_payload

          assert add_task_payload["applied"] is True, add_task_payload
          assert add_task_payload["message"] == "task added", add_task_payload
          assert add_task_payload["payload"]["task_id"], add_task_payload

          assert queue_payload["backlog_depth"] == 1, queue_payload
          assert queue_payload["active_task"] is None, queue_payload
          assert queue_payload["next_task"]["title"] == "Release smoke task", queue_payload
          assert queue_payload["backlog"][0]["title"] == "Release smoke task", queue_payload
          PY

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/millrace-ai
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
