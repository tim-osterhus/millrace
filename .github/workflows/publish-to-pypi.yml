name: Publish To PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: python -m pip install --upgrade pip uv twine

      - name: Build distribution artifacts
        run: uv build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Smoke install built wheel against the minimum-functionality contract
        run: |
          set -euo pipefail
          python -m venv .publish-smoke
          .publish-smoke/bin/python -m pip install --upgrade pip
          .publish-smoke/bin/python -m pip install dist/*.whl
          workspace="$RUNNER_TEMP/millrace-minimum-functionality"
          rm -rf "$workspace"
          mkdir -p "$workspace"

          .publish-smoke/bin/millrace compile validate --workspace "$workspace" > "$RUNNER_TEMP/millrace-compile.txt"
          .publish-smoke/bin/millrace run once --workspace "$workspace" > "$RUNNER_TEMP/millrace-run-once.txt"
          .publish-smoke/bin/millrace status --workspace "$workspace" > "$RUNNER_TEMP/millrace-status.txt"

          test -f "$workspace/millrace-agents/millrace.toml"
          test -f "$workspace/millrace-agents/state/compiled_plan.json"
          grep -q '^ok: true$' "$RUNNER_TEMP/millrace-compile.txt"
          grep -q '^tick_reason: no_work$' "$RUNNER_TEMP/millrace-run-once.txt"
          grep -q '^compiled_plan_id: ' "$RUNNER_TEMP/millrace-status.txt"

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/millrace-ai
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
