name: Publish To PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distribution artifacts
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Smoke install built wheel
        run: |
          python -m venv .publish-smoke
          .publish-smoke/bin/python -m pip install --upgrade pip
          .publish-smoke/bin/python -m pip install dist/*.whl
          .publish-smoke/bin/millrace --help
          .publish-smoke/bin/millrace init /tmp/millrace-publish-smoke --json
          .publish-smoke/bin/millrace --config /tmp/millrace-publish-smoke/millrace.toml health --json

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/millrace-ai
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
