name: Publish To PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distribution artifacts
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Smoke install built wheel against the release core contract
        run: |
          set -euo pipefail
          python -m venv .publish-smoke
          .publish-smoke/bin/python -m pip install --upgrade pip
          .publish-smoke/bin/python -m pip install dist/*.whl
          .publish-smoke/bin/millrace --help
          export SMOKE_ROOT="/tmp/millrace-publish-smoke"
          export SMOKE_BIN="$SMOKE_ROOT/bin"
          export EXEC_WORKSPACE="$SMOKE_ROOT/execution"
          export RESEARCH_WORKSPACE="$SMOKE_ROOT/research"
          export PUBLISH_WORKSPACE="$SMOKE_ROOT/publish"
          export STAGING_REPO="$SMOKE_ROOT/staging-repo"
          rm -rf "$SMOKE_ROOT"
          mkdir -p "$SMOKE_BIN"
          cat > "$SMOKE_BIN/codex" <<'PY'
          #!/usr/bin/env python3
          from __future__ import annotations

          import os
          import sys
          from pathlib import Path

          STAGE_RESULTS = {
              "builder": ("builder complete", "BUILDER_COMPLETE"),
              "integration": ("integration complete", "INTEGRATION_COMPLETE"),
              "qa": ("qa complete", "QA_COMPLETE"),
              "hotfix": ("hotfix complete", "HOTFIX_COMPLETE"),
              "doublecheck": ("doublecheck complete", "QA_COMPLETE"),
              "troubleshoot": ("troubleshoot complete", "TROUBLESHOOT_COMPLETE"),
              "consult": ("consult complete", "CONSULT_COMPLETE"),
              "update": ("update complete", "UPDATE_COMPLETE"),
          }

          def output_path_from_args(argv: list[str]) -> Path | None:
              for index, token in enumerate(argv[:-1]):
                  if token == "-o":
                      return Path(argv[index + 1])
              return None

          stage = os.environ.get("MILLRACE_STAGE", "")
          if stage not in STAGE_RESULTS:
              print(f"unsupported release smoke stage: {stage}", file=sys.stderr)
              raise SystemExit(9)

          message, marker = STAGE_RESULTS[stage]
          payload = f"{message}\n### {marker}\n"
          sys.stdout.write(payload)

          output_path = output_path_from_args(sys.argv[1:])
          if output_path is not None:
              output_path.write_text(payload, encoding="utf-8")
          PY
          chmod +x "$SMOKE_BIN/codex"
          export PATH="$SMOKE_BIN:$PATH"

          .publish-smoke/bin/millrace init "$EXEC_WORKSPACE" --json
          .publish-smoke/bin/millrace --config "$EXEC_WORKSPACE/millrace.toml" health --json > /tmp/millrace-publish-smoke-exec-health.json
          .publish-smoke/bin/millrace --config "$EXEC_WORKSPACE/millrace.toml" doctor --json > /tmp/millrace-publish-smoke-exec-doctor.json
          .publish-smoke/bin/millrace --config "$EXEC_WORKSPACE/millrace.toml" add-task "Release smoke task" --json > /tmp/millrace-publish-smoke-exec-add-task.json
          .publish-smoke/bin/millrace --config "$EXEC_WORKSPACE/millrace.toml" start --once --json > /tmp/millrace-publish-smoke-exec-start.json
          .publish-smoke/bin/millrace --config "$EXEC_WORKSPACE/millrace.toml" queue inspect --json > /tmp/millrace-publish-smoke-exec-queue.json

          .publish-smoke/bin/millrace init "$RESEARCH_WORKSPACE" --json
          .publish-smoke/bin/python - <<'PY'
          from __future__ import annotations

          import os
          from pathlib import Path

          workspace = Path(os.environ["RESEARCH_WORKSPACE"])
          config_path = workspace / "millrace.toml"
          config_text = config_path.read_text(encoding="utf-8")
          config_path.write_text(config_text.replace('mode = "stub"', 'mode = "auto"', 1), encoding="utf-8")
          raw_dir = workspace / "agents" / "ideas" / "raw"
          raw_dir.mkdir(parents=True, exist_ok=True)
          (raw_dir / "goal.md").write_text(
              "---\n"
              "idea_id: IDEA-RELEASE-SMOKE-001\n"
              "title: Support Ticket Service\n"
              "decomposition_profile: moderate\n"
              "---\n\n"
              "# Support Ticket Service\n\n"
              "Build the first usable support-ticket web app for a Python service.\n\n"
              "## Capability Domains\n"
              "- Ticket creation API\n"
              "- Agent inbox triage dashboard\n"
              "- Escalation notifications\n\n"
              "## Progression Lines\n"
              "- Progression from ticket intake to assignment to resolution confirmation.\n"
              "- Automated validation covers API behavior and core service flow.\n",
              encoding="utf-8",
          )
          PY
          .publish-smoke/bin/millrace --config "$RESEARCH_WORKSPACE/millrace.toml" start --once --json > /tmp/millrace-publish-smoke-research-start.json
          for pass in 2 3 4 5 6; do
            .publish-smoke/bin/millrace --config "$RESEARCH_WORKSPACE/millrace.toml" start --once --json > "/tmp/millrace-publish-smoke-research-start-${pass}.json"
            .publish-smoke/bin/millrace --config "$RESEARCH_WORKSPACE/millrace.toml" research --json > /tmp/millrace-publish-smoke-research-report.json
            if .publish-smoke/bin/python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/millrace-publish-smoke-research-report.json").read_text(encoding="utf-8"))
          runtime = payload.get("runtime") or {}
          raise SystemExit(0 if payload.get("status") == "BLOCKED" and runtime.get("last_mode") == "GOALSPEC" else 1)
          PY
            then
              break
            fi
          done
          .publish-smoke/bin/millrace --config "$RESEARCH_WORKSPACE/millrace.toml" research --json > /tmp/millrace-publish-smoke-research-report.json
          .publish-smoke/bin/millrace --config "$RESEARCH_WORKSPACE/millrace.toml" queue inspect --json > /tmp/millrace-publish-smoke-research-queue.json
          .publish-smoke/bin/millrace --config "$RESEARCH_WORKSPACE/millrace.toml" supervisor report --recent-events 20 --json > /tmp/millrace-publish-smoke-research-supervisor.json

          mkdir -p "$STAGING_REPO"
          git -C "$STAGING_REPO" init
          git -C "$STAGING_REPO" config user.email tests@example.com
          git -C "$STAGING_REPO" config user.name "Millrace Tests"
          .publish-smoke/bin/millrace init "$PUBLISH_WORKSPACE" --json
          .publish-smoke/bin/millrace --config "$PUBLISH_WORKSPACE/millrace.toml" publish sync --staging-repo-dir "$STAGING_REPO" --json > /tmp/millrace-publish-smoke-publish-sync.json
          .publish-smoke/bin/millrace --config "$PUBLISH_WORKSPACE/millrace.toml" publish preflight --staging-repo-dir "$STAGING_REPO" --message "Release smoke publish preflight" --no-push --json > /tmp/millrace-publish-smoke-publish-preflight.json

          .publish-smoke/bin/python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          exec_health_payload = json.loads(Path("/tmp/millrace-publish-smoke-exec-health.json").read_text(encoding="utf-8"))
          exec_doctor_payload = json.loads(Path("/tmp/millrace-publish-smoke-exec-doctor.json").read_text(encoding="utf-8"))
          exec_add_task_payload = json.loads(Path("/tmp/millrace-publish-smoke-exec-add-task.json").read_text(encoding="utf-8"))
          exec_start_payload = json.loads(Path("/tmp/millrace-publish-smoke-exec-start.json").read_text(encoding="utf-8"))
          exec_queue_payload = json.loads(Path("/tmp/millrace-publish-smoke-exec-queue.json").read_text(encoding="utf-8"))
          research_start_payload = json.loads(Path("/tmp/millrace-publish-smoke-research-start.json").read_text(encoding="utf-8"))
          research_report_payload = json.loads(Path("/tmp/millrace-publish-smoke-research-report.json").read_text(encoding="utf-8"))
          research_queue_payload = json.loads(Path("/tmp/millrace-publish-smoke-research-queue.json").read_text(encoding="utf-8"))
          research_supervisor_payload = json.loads(
              Path("/tmp/millrace-publish-smoke-research-supervisor.json").read_text(encoding="utf-8")
          )
          publish_sync_payload = json.loads(Path("/tmp/millrace-publish-smoke-publish-sync.json").read_text(encoding="utf-8"))
          publish_preflight_payload = json.loads(
              Path("/tmp/millrace-publish-smoke-publish-preflight.json").read_text(encoding="utf-8")
          )

          exec_workspace = Path(os.environ["EXEC_WORKSPACE"])
          research_workspace = Path(os.environ["RESEARCH_WORKSPACE"])
          exec_events = [
              json.loads(line)
              for line in (exec_workspace / "agents" / "engine_events.log").read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          exec_archive_text = (exec_workspace / "agents" / "tasksarchive.md").read_text(encoding="utf-8")
          research_spec_decision_text = (
              research_workspace / "agents" / "specs" / "decisions" / "SPEC-RELEASE-SMOKE-001__support-ticket-service__spec-review.md"
          ).read_text(encoding="utf-8")
          research_spec_questions_text = (
              research_workspace / "agents" / "specs" / "questions" / "SPEC-RELEASE-SMOKE-001__support-ticket-service__spec-review.md"
          ).read_text(encoding="utf-8")

          assert exec_health_payload["bootstrap_ready"] is True, exec_health_payload
          assert exec_health_payload["config_source_kind"] == "native_toml", exec_health_payload

          assert exec_doctor_payload["bootstrap_ready"] is True, exec_doctor_payload
          assert exec_doctor_payload["execution_ready"] is True, exec_doctor_payload
          assert any(
              entry["executable"] == "codex" and entry["available"] is True
              for entry in exec_doctor_payload["runner_prerequisites"]
          ), exec_doctor_payload

          assert exec_add_task_payload["applied"] is True, exec_add_task_payload
          assert exec_add_task_payload["message"] == "task added", exec_add_task_payload
          assert exec_add_task_payload["payload"]["task_id"], exec_add_task_payload

          assert exec_start_payload["execution_status"] == "IDLE", exec_start_payload
          assert exec_start_payload["backlog_depth"] == 0, exec_start_payload
          assert exec_queue_payload["backlog_depth"] == 0, exec_queue_payload
          assert exec_queue_payload["active_task"] is None, exec_queue_payload
          assert exec_queue_payload["next_task"] is None, exec_queue_payload
          assert "Release smoke task" in exec_archive_text, exec_archive_text
          assert any(
              event["type"] == "execution.stage.started" and event["payload"].get("stage") == "builder"
              for event in exec_events
          ), exec_events
          assert any(
              event["type"] == "execution.stage.started" and event["payload"].get("stage") == "qa"
              for event in exec_events
          ), exec_events
          assert any(
              event["type"] == "execution.stage.started" and event["payload"].get("stage") == "update"
              for event in exec_events
          ), exec_events
          assert any(event["type"] == "execution.task.archived" for event in exec_events), exec_events

          assert research_start_payload["research_status"] == "OBJECTIVE_PROFILE_SYNC_RUNNING", research_start_payload
          assert research_start_payload["backlog_depth"] == 0, research_start_payload
          assert research_report_payload["configured_mode"] == "auto", research_report_payload
          assert research_report_payload["status"] == "TASKMASTER_RUNNING", research_report_payload
          assert research_report_payload["runtime"]["cycle_count"] >= 1, research_report_payload
          assert research_report_payload["runtime"]["last_mode"] == "STUB", research_report_payload
          assert research_report_payload["runtime"]["current_mode"] == "GOALSPEC", research_report_payload
          assert research_report_payload["runtime"]["checkpoint"]["node_id"] == "taskmaster", research_report_payload
          assert research_queue_payload["backlog_depth"] == 0, research_queue_payload
          assert research_queue_payload["next_task"] is None, research_queue_payload
          assert research_supervisor_payload["attention_reason"] == "idle_with_pending_work", research_supervisor_payload
          assert research_supervisor_payload["backlog_depth"] == 0, research_supervisor_payload
          assert research_supervisor_payload["next_task"] is None, research_supervisor_payload
          assert any(
              event["type"] == "research.checkpoint.resumed"
              for event in research_supervisor_payload["recent_events"]
          ), research_supervisor_payload
          assert "Review-Status:" in research_spec_decision_text, research_spec_decision_text
          assert "Critic Findings" in research_spec_questions_text, research_spec_questions_text

          assert any(entry["path"] == "agents" and entry["action"] == "synced" for entry in publish_sync_payload["entries"]), publish_sync_payload
          assert "README.md" in publish_sync_payload["selection"]["required_paths"], publish_sync_payload
          assert publish_preflight_payload["status"] == "ready", publish_preflight_payload
          assert publish_preflight_payload["commit_allowed"] is True, publish_preflight_payload
          assert publish_preflight_payload["skip_reason"] == "push_disabled", publish_preflight_payload
          assert "README.md" in publish_preflight_payload["changed_paths"], publish_preflight_payload
          PY

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/millrace-ai
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
